<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Eventos</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Formulario de Usuario</h2>
        <form th:action="@{/usuario/guardar}" method="post" th:object="${usuario}" class="card p-4 shadow">
            <input type="hidden" th:field="*{id}"/>
            
            <div class="mb-3">
                <label>Nombre:</label>
                <input type="text" th:field="*{nombre}" class="form-control" required/>
            </div>
            
            <div class="mb-3">
                <label>Email:</label>
                <input type="email" th:field="*{email}" class="form-control" required/>
            </div>
            
            <div class="mb-3">
                <label>Contraseña:</label>
                <input type="password" th:field="*{password}" class="form-control" required/>
            </div>
            
            <div class="mb-3">
                <label>Rol:</label>
                <select th:field="*{rol.id}" class="form-control">
                    <option th:each="rol : ${roles}" th:value="${rol.id}" th:text="${rol.nombre}"></option>
                </select>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" th:field="*{activo}" class="form-check-input"/>
                <label class="form-check-label">Activo</label>
            </div>
            
            <button class="btn btn-success">Guardar</button>
        </form>
    </div>
</body>
</html>
