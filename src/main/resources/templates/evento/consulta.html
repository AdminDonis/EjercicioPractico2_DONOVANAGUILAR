<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Eventos</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" th:href="@{/evento/listado}">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/usuario/listado}">Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/rol/listado}">Roles</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/evento/consulta}">Consultas</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" th:href="@{/logout}">Salir</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Buscar Eventos</h2>
        <div class="row">
            <div class="col-md-6">
                <div class="card p-4 shadow">
                    <h5>Por Nombre</h5>
                    <form th:action="@{/evento/buscarNombre}" method="post">
                        <input type="text" name="nombre" class="form-control mb-3" placeholder="Nombre evento">
                        <button class="btn btn-primary w-100">Buscar</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-4 shadow">
                    <h5>Por Fechas</h5>
                    <form th:action="@{/evento/buscarFechas}" method="post">
                        <input type="date" name="inicio" class="form-control mb-2">
                        <input type="date" name="fin" class="form-control mb-3">
                        <button class="btn btn-success w-100">Buscar</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <a class="btn btn-warning" th:href="@{/evento/activos}">Eventos Activos</a>
        </div>
    </div>
</body>
</html>
