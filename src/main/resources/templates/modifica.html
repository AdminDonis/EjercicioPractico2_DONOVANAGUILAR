<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Eventos</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Formulario de Evento</h2>
        <form th:action="@{/evento/guardar}" method="post" th:object="${evento}" class="card p-4 shadow">
            <input type="hidden" th:field="*{id}"/>
            
            <div class="mb-3">
                <label>Nombre:</label>
                <input type="text" th:field="*{nombre}" class="form-control" required/>
            </div>
            
            <div class="mb-3">
                <label>Descripción:</label>
                <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
            </div>
            
            <div class="mb-3">
                <label>Fecha:</label>
                <input type="date" th:field="*{fecha}" class="form-control" required/>
            </div>
            
            <div class="mb-3">
                <label>Capacidad:</label>
                <input type="number" th:field="*{capacidad}" class="form-control" required/>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" th:field="*{activo}" class="form-check-input"/>
                <label class="form-check-label">Activo</label>
            </div>
            
            <button class="btn btn-success">Guardar</button>
        </form>
    </div>
</body>
</html>
