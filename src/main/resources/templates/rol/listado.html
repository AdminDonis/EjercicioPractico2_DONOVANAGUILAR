<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Eventos</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" th:href="@{/evento/listado}">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/usuario/listado}">Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/rol/listado}">Roles</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/evento/consulta}">Consultas</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" th:href="@{/logout}">Salir</a></li>
                    <div sec:authorize="hasRole('ADMIN')">
                        <a class="btn btn-primary mb-3" th:href="@{/usuario/nuevo}">+ Nuevo Usuario</a>

                    </div>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Listado de Roles</h2>
        <a class="btn btn-primary mb-3" th:href="@{/rol/nuevo}">+ Nuevo Rol</a>
        
        <table class="table table-striped table-hover shadow">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="rol : ${roles}">
                    <td th:text="${rol.id}"></td>
                    <td th:text="${rol.nombre}"></td>
                    <td>
                        <a class="btn btn-warning btn-sm" th:href="@{'/rol/modificar/' + ${rol.id}}">Editar</a>
                        <a class="btn btn-danger btn-sm" th:href="@{'/rol/eliminar/' + ${rol.id}}">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
